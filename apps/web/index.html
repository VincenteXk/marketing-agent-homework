<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Marketing Lab</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Marketing Agent Copilot</h1>
      <p class="muted">直接用业务语言描述你的需求，我会自动完成市场探索、画像、联合分析与策略建议。</p>

      <section class="card">
        <h2>业务对话</h2>
        <div id="chat_log" class="chat-log"></div>
        <textarea
          id="chat_input"
          rows="3"
          placeholder="例如：我们想做AI陪伴APP，面向大学生和职场年轻人，希望验证产品策略和付费模式，样本量100"
        ></textarea>
        <div class="actions">
          <button id="send_btn">发送需求</button>
          <button id="run_btn" class="primary">开始分析</button>
          <button id="status_btn">刷新状态</button>
          <button id="result_btn">查看结果</button>
        </div>
        <p id="session_hint" class="muted small">会话：未创建</p>
      </section>

      <section class="card">
        <h2>执行进度</h2>
        <div id="timeline" class="timeline"></div>
        <pre id="status_view" class="output"></pre>
      </section>

      <section class="card">
        <h2>结果中心</h2>
        <div id="result_cards" class="result-cards"></div>
        <pre id="result_view" class="output"></pre>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
